# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "389cfda8f442aa734d71959d02934e57"
name = "Easy Wishlist"
application_url = "https://easy-wishlist-azure.vercel.app"
embedded = true

[access_scopes]
# write_customers is needed to update customer metafields via the app proxy
# when syncing a logged-in customer's localStorage wishlist to the server.
scopes = "read_products,write_customers"

# App proxy — storefront requests to {shop}/apps/wishlist/... route here.
# Used by wishlist.js to sync localStorage → customer metafield on login.
[app_proxy]
url = "https://easy-wishlist-azure.vercel.app/apps/wishlist"
subpath = "wishlist"
prefix = "apps"

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = [ "app/scopes_update" ]


[auth]
redirect_urls = [ "https://easy-wishlist-azure.vercel.app/api/auth" ]

[build]
automatically_update_urls_on_dev = true
